name: frontend
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core:   ^2.24.2
  firebase_auth:   ^4.17.0
  cloud_firestore: ^4.15.0
  google_fonts:    ^6.3.2
  http:            ^1.6.0
  uuid:            ^4.5.2
  share_plus:      ^10.0.0
  fl_chart:        ^0.69.0
  url_launcher:    ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:          ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.jpeg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpeg"